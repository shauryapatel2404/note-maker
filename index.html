<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>30 Days Note Maker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .notebook{
      width:95%;
      max-width:1000px;
      background:white;
      border-radius:20px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
      font-size:40px;
    }

    .top-bar{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    input{
      flex:1;
      padding:15px;
      border:2px solid #ddd;
      border-radius:10px;
      font-size:18px;
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:10px;
      background:#222;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#444;
    }

    textarea{
      width:100%;
      height:500px;
      border:2px solid #ddd;
      border-radius:15px;
      padding:20px;
      font-size:20px;
      resize:none;
      outline:none;
      line-height:1.7;
    }

    .saved{
      margin-top:15px;
      color:green;
      font-size:18px;
      text-align:center;
    }

    @media(max-width:700px){
      textarea{
        height:400px;
      }

      h1{
        font-size:30px;
      }
    }
  </style>
</head>
<body>

  <div class="notebook">

    <h1>30 Days Note Maker</h1>

    <div class="top-bar">
      <input type="text" id="title" placeholder="Write note title...">
      <button onclick="saveNote()">Save Note</button>
      <button onclick="clearNote()">Clear</button>
    </div>

    <textarea id="note" placeholder="Write all your notes here..."></textarea>

    <div class="saved" id="savedText"></div>

  </div>

  <script>
    // Load saved data
    window.onload = function () {
      document.getElementById("title").value =
        localStorage.getItem("noteTitle") || "";

      document.getElementById("note").value =
        localStorage.getItem("noteText") || "";
    };

    // Save note
    function saveNote() {
      const title = document.getElementById("title").value;
      const note = document.getElementById("note").value;

      localStorage.setItem("noteTitle", title);
      localStorage.setItem("noteText", note);

      document.getElementById("savedText").innerText =
        "✅ Notes Saved Successfully!";
    }

    // Clear note
    function clearNote() {
      if(confirm("Delete all notes?")) {
        localStorage.removeItem("noteTitle");
        localStorage.removeItem("noteText");

        document.getElementById("title").value = "";
        document.getElementById("note").value = "";

        document.getElementById("savedText").innerText =
          "🗑️ Notes Cleared!";
      }
    }

    // Auto Save Every 5 Seconds
    setInterval(() => {
      const title = document.getElementById("title").value;
      const note = document.getElementById("note").value;

      localStorage.setItem("noteTitle", title);
      localStorage.setItem("noteText", note);
    }, 5000);
  </script>

</body>
</html>
