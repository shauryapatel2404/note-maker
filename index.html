<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Days Note Saver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .day-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .day-card.has-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .day-card.has-content::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 1.2em;
            opacity: 0.7;
        }

        .day-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .day-card.has-content .day-number {
            color: white;
        }

        .day-label {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .day-card.has-content .day-label {
            opacity: 0.9;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 1.8em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .save-indicator {
            color: #667eea;
            font-size: 0.9em;
            text-align: center;
            padding: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .save-indicator.show {
            opacity: 1;
        }

        /* Stats Section */
        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stats-content {
            color: #333;
        }

        .stats-content h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stats-content p {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 10px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .textarea {
                height: 200px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 30 Days Note Saver</h1>
            <p>Write and save your daily notes</p>
        </div>

        <div class="stats">
            <div class="stats-content">
                <h3>Days with Notes</h3>
                <p id="stat-count">0 / 30</p>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Day <span id="dayNumber"></span></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <textarea class="textarea" id="noteTextarea" placeholder="Write your note here..."></textarea>
            </div>
            <div class="save-indicator" id="saveIndicator">✓ Saved</div>
            <div class="modal-footer">
                <button class="btn btn-delete" onclick="deleteNote()">Delete Note</button>
                <button class="btn btn-cancel" onclick="closeModal()">Close</button>
                <button class="btn btn-save" onclick="saveNote()">Save Note</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'notes30days';
        let currentDay = null;
        let notes = {};

        // Initialize
        function init() {
            loadNotes();
            renderCalendar();
            updateStats();
        }

        // Load notes from localStorage
        function loadNotes() {
            const stored = localStorage.getItem(STORAGE_KEY);
            notes = stored ? JSON.parse(stored) : {};
        }

        // Save notes to localStorage
        function saveNotesToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            updateStats();
        }

        // Render calendar grid
        function renderCalendar() {
            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            for (let day = 1; day <= 30; day++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                if (notes[day] && notes[day].trim()) {
                    card.classList.add('has-content');
                }
                card.innerHTML = `
                    <div class="day-number">${day}</div>
                    <div class="day-label">Day</div>
                `;
                card.onclick = () => openModal(day);
                calendarGrid.appendChild(card);
            }
        }

        // Open modal
        function openModal(day) {
            currentDay = day;
            document.getElementById('dayNumber').textContent = day;
            document.getElementById('noteTextarea').value = notes[day] || '';
            document.getElementById('noteModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('noteModal').classList.remove('active');
            currentDay = null;
        }

        // Save note
        function saveNote() {
            if (currentDay === null) return;

            const content = document.getElementById('noteTextarea').value;
            notes[currentDay] = content;
            saveNotesToStorage();
            renderCalendar();

            // Show save indicator
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        }

        // Delete note
        function deleteNote() {
            if (currentDay === null) return;

            if (confirm('Are you sure you want to delete this note?')) {
                delete notes[currentDay];
                saveNotesToStorage();
                renderCalendar();
                closeModal();
            }
        }

        // Update stats
        function updateStats() {
            const count = Object.keys(notes).filter(day => notes[day] && notes[day].trim()).length;
            document.getElementById('stat-count').textContent = `${count} / 30`;
        }

        // Close modal when clicking outside
        document.getElementById('noteModal').addEventListener('click', (e) => {
            if (e.target.id === 'noteModal') {
                closeModal();
            }
        });

        // Auto-save on textarea change (optional)
        document.getElementById('noteTextarea').addEventListener('change', saveNote);

        // Initialize on page load
        window.addEventListener('load', init);
    </script>
</body>
</html>
